    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/papaparse@latest/papaparse.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#symptoms').select2({
                placeholder: "Select symptoms",
                allowClear: true,
                width: '100%'
            });

            // Object to store disease data
            let diseaseData = {};
            let predictedDisease = "Diabetes"; // Simulated prediction (replace with actual backend response)

            // Function to clean and parse CSV data
            function parseCsv(csv, callback) {
                Papa.parse(csv, {
                    header: true,
                    skipEmptyLines: true,
                    dynamicTyping: false,
                    transformHeader: (header) => header.trim().replace(/^"|"$/g, ''),
                    transform: (value, header) => {
                        let cleaned = value.trim().replace(/^"|"$/g, '');
                        return cleaned;
                    },
                    complete: (results) => {
                        callback(results.data);
                    },
                    error: (err) => console.error('CSV Parsing Error:', err)
                });
            }

            // Function to process and clean data
            function processData(data, key, transform) {
                return data
                    .filter(row => row[key] && row[key].toLowerCase() !== 'common cold') // Exclude Common Cold
                    .reduce((acc, row) => {
                        const disease = row[key].trim();
                        acc[disease] = transform(row);
                        return acc;
                    }, {});
            }

            // Load and process all CSV files
            Promise.all([
                new Promise(resolve => parseCsv(loadFileData('workout_df.csv'), resolve)),
                new Promise(resolve => parseCsv(loadFileData('precautions_df.csv'), resolve)),
                new Promise(resolve => parseCsv(loadFileData('medications.csv'), resolve)),
                new Promise(resolve => parseCsv(loadFileData('diets.csv'), resolve)),
                new Promise(resolve => parseCsv(loadFileData('description.csv'), resolve))
            ]).then(([workouts, precautions, medications, diets, descriptions]) => {
                // Process workouts
                const workoutMap = processData(workouts, 'disease', row => {
                    return diseaseData[row.disease]?.workouts || [row.workout];
                });

                // Process precautions
                const precautionMap = processData(precautions, 'Disease', row => {
                    return [row.Precaution_1, row.Precaution_2, row.Precaution_3, row.Precaution_4]
                        .filter(p => p && p.trim());
                });

                // Process medications
                const medicationMap = processData(medications, 'Disease', row => {
                    try {
                        return JSON.parse(row.Medication.replace(/'/g, '"'));
                    } catch (e) {
                        console.error('Error parsing medication:', row.Medication);
                        return [];
                    }
                });

                // Process diets
                const dietMap = processData(diets, 'Disease', row => {
                    try {
                        return JSON.parse(row.Diet.replace(/'/g, '"'));
                    } catch (e) {
                        console.error('Error parsing diet:', row.Diet);
                        return [];
                    }
                });

                // Process descriptions
                const descriptionMap = processData(descriptions, 'Disease', row => row.Description);

                // Combine all data into diseaseData
                Object.keys(workoutMap).forEach(disease => {
                    diseaseData[disease] = {
                        workouts: workoutMap[disease] || [],
                        precautions: precautionMap[disease] || [],
                        medications: medicationMap[disease] || [],
                        diets: dietMap[disease] || [],
                        description: descriptionMap[disease] || ''
                    };
                });

                // Hide loading message and show results if predicted disease exists
                document.getElementById('loadingSection').style.display = 'none';
                if (diseaseData[predictedDisease]) {
                    document.getElementById('resultSection').style.display = 'block';
                    showResult('disease'); // Show disease name by default
                } else {
                    document.getElementById('resultDisplay').innerHTML = 'No valid disease predicted.';
                }
            }).catch(err => {
                console.error('Error loading CSVs:', err);
                document.getElementById('loadingSection').innerHTML = 'Error loading data.';
            });

            // Function to display results
            window.showResult = function(type) {
                const resultDisplay = document.getElementById('resultDisplay');
                let content = '';

                if (!diseaseData[predictedDisease]) {
                    resultDisplay.innerHTML = 'No data available for the predicted disease.';
                    return;
                }

                switch(type) {
                    case 'disease':
                        content = predictedDisease;
                        break;
                    case 'description':
                        content = diseaseData[predictedDisease].description || 'No description available.';
                        break;
                    case 'precaution':
                        content = diseaseData[predictedDisease].precautions.length
                            ? '<ul>' + diseaseData[predictedDisease].precautions.map(item => `<li>${item}</li>`).join('') + '</ul>'
                            : 'No precautions available.';
                        break;
                    case 'medications':
                        content = diseaseData[predictedDisease].medications.length
                            ? '<ul>' + diseaseData[predictedDisease].medications.map(item => `<li>${item}</li>`).join('') + '</ul>'
                            : 'No medications available.';
                        break;
                    case 'workouts':
                        content = diseaseData[predictedDisease].workouts.length
                            ? '<ul>' + diseaseData[predictedDisease].workouts.map(item => `<li>${item}</li>`).join('') + '</ul>'
                            : 'No workouts available.';
                        break;
                    case 'diets':
                        content = diseaseData[predictedDisease].diets.length
                            ? '<ul>' + diseaseData[predictedDisease].diets.map(item => `<li>${item}</li>`).join('') + '</ul>'
                            : 'No diets available.';
                        break;
                }
                resultDisplay.innerHTML = content;
            };
        });
    </script>
